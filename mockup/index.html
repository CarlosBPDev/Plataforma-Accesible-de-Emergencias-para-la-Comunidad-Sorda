<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>logo - emergencias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#003d22;--g2:#004a2b;--g3:#006338;--g4:#008548;--g5:#00a85a;
  --gl:#d4ede0;--g50:#f0f7f3;--w:#ffffff;
  --r1:#b91c1c;--r2:#dc2626;
  --shadow:0 4px 20px rgba(0,40,20,.08);
  --shadow-lg:0 8px 40px rgba(0,40,20,.14);
  --radius:16px;--radius-lg:24px
}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:linear-gradient(170deg,var(--g50) 0%,var(--w) 100%);
  color:var(--g2);
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;min-height:100vh
}
header{
  background:linear-gradient(135deg,var(--g3),var(--g2));
  padding:16px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10
}
header .logo{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--w)}
header .logo span{font-weight:300;opacity:.6}
.header-right a{color:var(--w);display:flex;opacity:.8;transition:opacity .2s}
.header-right a:active{opacity:.5}
.content{flex:1;overflow-y:auto;padding:20px 16px 8px;max-width:480px;margin:0 auto;width:100%}
/* panic card */
.panic-card{
  background:linear-gradient(135deg,var(--r2),var(--r1));
  border-radius:var(--radius-lg);
  padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 6px 28px rgba(220,38,38,.35);
  cursor:pointer;color:var(--w);
  margin-bottom:24px;
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
  border:none;width:100%;text-align:left;
  font-family:'DM Sans',sans-serif;
  -webkit-tap-highlight-color:transparent
}
.panic-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);
  background-size:200% 100%;
  animation:shimmer 3s ease-in-out infinite
}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
.panic-card:active{transform:scale(.97);box-shadow:0 4px 16px rgba(220,38,38,.3)}
.panic-card .left{display:flex;align-items:center;gap:14px}
.panic-card .left svg{width:32px;height:32px;flex-shrink:0}
.panic-card .left .p-title{font-size:17px;font-weight:700;letter-spacing:.5px}
.panic-card .left .p-sub{font-size:12px;opacity:.7;font-weight:500}
.panic-card .arrow svg{width:20px;height:20px;opacity:.7}
.panic-card .hold-track{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:rgba(255,255,255,.15);border-radius:0 0 var(--radius-lg) var(--radius-lg);
  overflow:hidden
}
.panic-card .hold-track .hold-fill{
  height:100%;width:0%;
  background:#fff;border-radius:0 0 0 var(--radius-lg);
  transition:none
}
.panic-card.holding .hold-track .hold-fill{background:rgba(255,255,255,.9)}
.panic-card .hold-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  opacity:0;transition:opacity .2s;margin-top:2px;text-align:center
}
.panic-card.holding .hold-label{opacity:1}
body.swal-blur>.content,body.swal-blur>header,body.swal-blur>.bottom-nav{
  filter:blur(4px);transition:filter .3s
}
/* section */
.section-title{
  font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--g2);opacity:.5;margin-bottom:14px;display:flex;align-items:center;gap:8px
}
.section-title svg{width:16px;height:16px}
/* grid */
.emergency-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px
}
.e-card{
  border-radius:var(--radius-lg);
  padding:24px 12px 18px;
  text-decoration:none;color:var(--w);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:transform .15s,box-shadow .2s;
  box-shadow:var(--shadow-lg)
}
.e-card:active{transform:scale(.95)}
.e-card svg{width:40px;height:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.e-card .e-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.e-card.c1{background:linear-gradient(145deg,#006338,#004a2b)}
.e-card.c2{background:linear-gradient(145deg,#1a4a7a,#0d3559)}
.e-card.c3{background:linear-gradient(145deg,#7a4a1a,#59350d)}
.e-card.c4{background:linear-gradient(145deg,#4a2b6a,#351d50)}
/* last alert */
.alert-mini{
  background:var(--w);
  border-radius:var(--radius);
  padding:16px 18px;
  box-shadow:var(--shadow);
  border:1px solid rgba(0,99,56,.06);
  display:flex;align-items:center;gap:14px;
  margin-bottom:20px;text-decoration:none;color:var(--g2)
}
.alert-mini:active{opacity:.7}
.alert-mini svg{width:24px;height:24px;color:var(--g3);flex-shrink:0}
.alert-mini .a-info{flex:1}
.alert-mini .a-info .a-type{font-size:14px;font-weight:700}
.alert-mini .a-info .a-date{font-size:12px;opacity:.5;margin-top:2px}
.alert-mini .a-badge{
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  padding:4px 10px;border-radius:50px;
  background:linear-gradient(135deg,var(--g3),var(--g2));color:var(--w)
}
/* bottom nav */
.bottom-nav{
  background:var(--w);
  border-top:1px solid rgba(0,99,56,.08);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,6px) 0;
  position:sticky;bottom:0;z-index:20
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 4px;text-decoration:none;color:var(--g2);opacity:.4;
  transition:opacity .2s;position:relative
}
.nav-item.active{opacity:1}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:linear-gradient(90deg,var(--g3),var(--g4));
  border-radius:0 0 4px 4px
}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <div class="logo">logo</div>
  <div class="header-right">
    <a href="screens/perfil.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg></a>
  </div>
</header>

<div class="content">
  <button class="panic-card" id="panicBtn">
    <div class="left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 1 1 4 0 7 7 0 0 1 4 6v3l2 2H4l2-2v-3a7 7 0 0 1 4-6z"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/><path d="M21 6.5A11.2 11.2 0 0 0 18 4"/><path d="M3 6.5A11.2 11.2 0 0 1 6 4"/></svg>
      <div><div class="p-title">Panico</div><div class="p-sub">Mantener presionado 5s</div></div>
    </div>
    <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M15 8l4 4-4 4"/></svg></div>
    <div class="hold-track"><div class="hold-fill" id="panicFill"></div></div>
  </button>

  <div class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a12 12 0 0 0 8.5 3A12 12 0 0 1 12 21 12 12 0 0 1 3.5 6 12 12 0 0 0 12 3z"/></svg>
    Emergencias
  </div>

  <div class="emergency-grid">
    <a href="screens/wizard.html?tipo=violencia" class="e-card c1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a12 12 0 0 0 8.5 3A12 12 0 0 1 12 21 12 12 0 0 1 3.5 6 12 12 0 0 0 12 3z"/></svg>
      <span class="e-label">Violencia</span>
    </a>
    <a href="screens/wizard.html?tipo=robo" class="e-card c2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <span class="e-label">Robo</span>
    </a>
    <a href="screens/wizard.html?tipo=accidente" class="e-card c3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg>
      <span class="e-label">Accidente</span>
    </a>
    <a href="screens/wizard.html?tipo=otra" class="e-card c4">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="8" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="16" r="1.5"/></svg>
      <span class="e-label">Otra</span>
    </a>
  </div>

  <div class="section-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Ultima alerta
  </div>

  <a href="screens/seguimiento.html" class="alert-mini">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a12 12 0 0 0 8.5 3A12 12 0 0 1 12 21 12 12 0 0 1 3.5 6 12 12 0 0 0 12 3z"/></svg>
    <div class="a-info"><div class="a-type">Violencia</div><div class="a-date">12 may 2026 - 14:32</div></div>
    <div class="a-badge">En proceso</div>
  </a>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
    <span>Home</span>
  </a>
  <a href="screens/seguimiento.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
    <span>Seguir</span>
  </a>
  <a href="screens/perfil.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<script>
(function(){
  var btn=document.getElementById('panicBtn');
  var fill=document.getElementById('panicFill');
  var timer=null,startTime=null;
  var DURATION=5000;

  function trigger(){
    document.body.classList.add('swal-blur');
    Swal.fire({
      icon:'success',
      title:'Alerta de panico enviada',
      text:'Carabineros recibio tu ubicacion',
      background:'#f0f7f3',
      color:'#004a2b',
      confirmButtonColor:'#006338',
      confirmButtonText:'Ver estado',
      timer:5000,
      timerProgressBar:true,
      didOpen:function(){document.body.classList.add('swal-blur')},
      willClose:function(){document.body.classList.remove('swal-blur');window.location.href='screens/seguimiento.html'}
    }).then(function(r){
      if(r.isConfirmed)window.location.href='screens/seguimiento.html';
    });
  }

  function startHold(){
    if(timer)return;
    btn.classList.add('holding');
    startTime=Date.now();
    timer=setInterval(function(){
      var pct=Math.min((Date.now()-startTime)/DURATION*100,100);
      fill.style.width=pct+'%';
      if(pct>=100){
        clearInterval(timer);
        timer=null;
        btn.classList.remove('holding');
        fill.style.width='0%';
        trigger();
      }
    },30);
  }

  function cancelHold(){
    if(timer){clearInterval(timer);timer=null;}
    btn.classList.remove('holding');
    fill.style.width='0%';
  }

  btn.addEventListener('mousedown',startHold);
  btn.addEventListener('mouseup',cancelHold);
  btn.addEventListener('mouseleave',cancelHold);
  btn.addEventListener('touchstart',startHold,{passive:true});
  btn.addEventListener('touchend',cancelHold,{passive:true});
  btn.addEventListener('touchcancel',cancelHold,{passive:true});
})();
</script>
</body>
</html>
