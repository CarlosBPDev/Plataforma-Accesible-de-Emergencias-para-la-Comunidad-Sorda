<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Wizard - logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#003d22;--g2:#004a2b;--g3:#006338;--g4:#008548;--g5:#00a85a;
  --gl:#d4ede0;--g50:#f0f7f3;--w:#ffffff;
  --shadow:0 4px 20px rgba(0,40,20,.08);
  --radius:16px;--radius-lg:24px
}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:linear-gradient(170deg,var(--g50) 0%,var(--w) 100%);
  color:var(--g2);
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;min-height:100vh
}
header{
  background:linear-gradient(135deg,var(--g3),var(--g2));
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10
}
header a{color:var(--w);display:flex;transition:opacity .2s}
header a:active{opacity:.6}
header .logo{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--w);opacity:.9}
.header-right{display:flex;align-items:center;gap:12px}
.header-right .tipo-badge{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;color:var(--w)
}
.header-right a{color:var(--w);display:flex;opacity:.8}
.step-counter{font-size:12px;font-weight:600;color:var(--w);opacity:.7}
.content{
  flex:1;display:flex;flex-direction:column;
  padding:20px 16px 100px;overflow-y:auto;
  max-width:480px;margin:0 auto;width:100%
}
/* GIF area */
.question-area{
  width:100%;aspect-ratio:4/3;
  background:linear-gradient(145deg,#1a2a22,#1f3328);
  border-radius:var(--radius-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,20,10,.15);
  margin-bottom:4px;
  border:1px solid rgba(255,255,255,.04)
}
.question-area::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 60% 40%,rgba(0,99,56,.08),transparent 60%);
  pointer-events:none
}
.sign-svg{position:relative;z-index:1;width:120px;height:90px;color:rgba(255,255,255,.12);margin-bottom:10px}
.sign-svg.small{width:44px;height:34px;margin:0}
.q-label{
  font-size:12px;font-weight:600;color:rgba(255,255,255,.45);
  letter-spacing:1.5px;text-transform:uppercase;z-index:1;
  background:rgba(0,0,0,.25);padding:4px 16px;border-radius:50px;
  backdrop-filter:blur(4px)
}
/* answers grid */
.answers-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0
}
.answer-card{
  background:var(--w);border-radius:var(--radius);
  padding:14px 6px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  box-shadow:var(--shadow);
  border:2px solid transparent;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent
}
.answer-card:active{transform:scale(.95)}
.answer-card .sign-svg.small{color:var(--g2);opacity:.35}
.answer-card .a-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;opacity:.5
}
.answer-card.selected{
  border-color:var(--g3);
  background:var(--g50);
  box-shadow:0 0 0 4px rgba(0,99,56,.1),var(--shadow)
}
.answer-card.selected .sign-svg.small{opacity:1;color:var(--g3)}
.answer-card.selected .a-label{opacity:1;color:var(--g3)}
/* step dots */
.steps-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 0 18px
}
.step-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--gl);transition:all .3s
}
.step-dot.active{background:var(--g3);width:28px;border-radius:5px}
.step-dot.done{background:var(--g4);opacity:.4}
/* nav buttons */
.nav-row{display:flex;align-items:center;gap:12px;margin-top:auto;padding-top:8px}
body.swal-blur .content,body.swal-blur header,body.swal-blur .bottom-nav{
  filter:blur(4px);transition:filter .3s
}
.nav-btn{
  flex:1;padding:14px;border-radius:var(--radius-lg);
  border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s,opacity .15s;
  -webkit-tap-highlight-color:transparent
}
.nav-btn:active{transform:scale(.95)}
.nav-btn svg{width:22px;height:22px}
.nav-btn.prev{
  background:var(--w);color:var(--g2);
  box-shadow:var(--shadow);
  border:1px solid rgba(0,99,56,.08);
  max-width:56px
}
.nav-btn.prev:disabled{opacity:.25;cursor:default;transform:none}
.nav-btn.next{
  background:linear-gradient(135deg,var(--g3),var(--g2));
  color:var(--w);box-shadow:0 4px 16px rgba(0,99,56,.3)
}
.nav-btn.next.send{
  background:linear-gradient(135deg,var(--g5),var(--g3))
}
/* bottom nav */
.bottom-nav{
  background:var(--w);
  border-top:1px solid rgba(0,99,56,.08);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,6px) 0;
  position:fixed;bottom:0;left:0;right:0;z-index:30
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 4px;text-decoration:none;color:var(--g2);opacity:.4;
  transition:opacity .2s;position:relative
}
.nav-item.active{opacity:1}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:linear-gradient(90deg,var(--g3),var(--g4));
  border-radius:0 0 4px 4px
}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <a href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M5 12h14"/><path d="M5 12l6-6"/><path d="M5 12l6 6"/></svg></a>
  <div class="logo">logo</div>
  <div class="header-right">
    <span class="tipo-badge" id="tipoBadge">Violencia</span>
    <a href="perfil.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg></a>
  </div>
</header>

<div class="content">
  <!-- Question GIF -->
  <div class="question-area">
    <svg class="sign-svg" viewBox="0 0 120 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="35" cy="48" r="12"/>
      <line x1="26" y1="38" x2="20" y2="16"/>
      <line x1="32" y1="36" x2="29" y2="12"/>
      <line x1="38" y1="36" x2="38" y2="10"/>
      <line x1="44" y1="38" x2="48" y2="16"/>
      <circle cx="85" cy="48" r="12"/>
      <line x1="76" y1="38" x2="70" y2="14"/>
      <line x1="82" y1="36" x2="79" y2="10"/>
      <line x1="88" y1="36" x2="88" y2="10"/>
      <line x1="94" y1="38" x2="98" y2="14"/>
      <circle cx="35" cy="28" r="3" fill="currentColor" opacity=".3"/>
      <circle cx="85" cy="28" r="3" fill="currentColor" opacity=".3"/>
    </svg>
    <div class="q-label" id="qLabel">Donde estas?</div>
  </div>

  <!-- Answer options -->
  <div class="answers-grid" id="answersGrid"></div>

  <!-- Step dots -->
  <div class="steps-row" id="stepsRow"></div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="nav-btn prev" id="prevBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
    </button>
    <button class="nav-btn next" id="nextBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
    <span>Home</span>
  </a>
  <a href="seguimiento.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
    <span>Seguir</span>
  </a>
  <a href="perfil.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<script>
(function(){
  var tipo = new URLSearchParams(window.location.search).get('tipo') || 'violencia';
  var tipoMap = {violencia:'Violencia',robo:'Robo',accidente:'Accidente',otra:'Otra'};
  document.getElementById('tipoBadge').textContent = tipoMap[tipo] || 'Emergencia';

  var questions = [
    {
      label: "Donde estas?",
      answers: [
        { id:"a1", label:"Casa" },
        { id:"a2", label:"Calle" },
        { id:"a3", label:"Trabajo" },
        { id:"a4", label:"Otro" }
      ]
    },
    {
      label: "Esta armado?",
      answers: [
        { id:"b1", label:"Si" },
        { id:"b2", label:"No" },
        { id:"b3", label:"No se" },
        { id:"b4", label:"Probable" }
      ]
    },
    {
      label: "Que arma?",
      answers: [
        { id:"c1", label:"Blanca" },
        { id:"c2", label:"Fuego" },
        { id:"c3", label:"Otra" },
        { id:"c4", label:"Ninguna" }
      ]
    }
  ];

  var currentStep = 0;
  var selected = [null,null,null];
  var qLabel = document.getElementById('qLabel');
  var answersGrid = document.getElementById('answersGrid');
  var stepsRow = document.getElementById('stepsRow');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function handSVG(small){
    var cls = small ? 'sign-svg small' : 'sign-svg';
    return '<svg class="'+cls+'" viewBox="0 0 120 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">' +
      '<circle cx="35" cy="48" r="12"/><line x1="26" y1="38" x2="20" y2="16"/><line x1="32" y1="36" x2="29" y2="12"/>' +
      '<line x1="38" y1="36" x2="38" y2="10"/><line x1="44" y1="38" x2="48" y2="16"/>' +
      '<circle cx="85" cy="48" r="12"/><line x1="76" y1="38" x2="70" y2="14"/><line x1="82" y1="36" x2="79" y2="10"/>' +
      '<line x1="88" y1="36" x2="88" y2="10"/><line x1="94" y1="38" x2="98" y2="14"/>' +
      '<circle cx="35" cy="28" r="3" fill="currentColor" opacity=".3"/><circle cx="85" cy="28" r="3" fill="currentColor" opacity=".3"/>' +
    '</svg>';
  }

  function renderDots(){
    stepsRow.innerHTML = '';
    for(var i=0;i<questions.length;i++){
      var dot = document.createElement('div');
      dot.className = 'step-dot';
      if(i===currentStep) dot.classList.add('active');
      else if(i<currentStep) dot.classList.add('done');
      stepsRow.appendChild(dot);
    }
  }

  function renderAnswers(){
    var q = questions[currentStep];
    qLabel.textContent = q.label;
    answersGrid.innerHTML = '';
    q.answers.forEach(function(a){
      var card = document.createElement('div');
      card.className = 'answer-card';
      if(selected[currentStep]===a.id) card.classList.add('selected');
      card.innerHTML = handSVG(true) + '<span class="a-label">'+a.label+'</span>';
      card.addEventListener('click',(function(id){return function(){selectAnswer(id);}})(a.id));
      answersGrid.appendChild(card);
    });
    prevBtn.disabled = currentStep===0;
    var isLast = currentStep===questions.length-1;
    if(isLast){
      nextBtn.classList.add('send');
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>';
    } else {
      nextBtn.classList.remove('send');
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>';
    }
  }

  function selectAnswer(id){
    selected[currentStep]=id;
    var cards=answersGrid.querySelectorAll('.answer-card');
    for(var i=0;i<cards.length;i++) cards[i].classList.remove('selected');
    for(var i=0;i<cards.length;i++){
      var lbl=cards[i].querySelector('.a-label');
      if(lbl && lbl.textContent===getLabelById(id)){cards[i].classList.add('selected');break;}
    }
  }

  function getLabelById(id){
    for(var i=0;i<questions.length;i++)
      for(var j=0;j<questions[i].answers.length;j++)
        if(questions[i].answers[j].id===id) return questions[i].answers[j].label;
    return '';
  }

  function goToStep(s){
    if(s<0||s>=questions.length)return;
    currentStep=s;renderDots();renderAnswers();
  }

  prevBtn.addEventListener('click',function(){
    if(currentStep>0) goToStep(currentStep-1);
  });

  nextBtn.addEventListener('click',function(){
    if(!selected[currentStep]){
      document.body.classList.add('swal-blur');
      Swal.fire({
        icon:'warning',title:'Selecciona una opcion',
        text:'Elige una respuesta antes de continuar',
        background:'#f0f7f3',color:'#004a2b',
        confirmButtonColor:'#006338',confirmButtonText:'OK',
        didOpen:function(){document.body.classList.add('swal-blur')},
        willClose:function(){document.body.classList.remove('swal-blur')}
      });
      return;
    }
    if(currentStep===questions.length-1){
      document.body.classList.add('swal-blur');
      Swal.fire({
        icon:'success',
        title:'Alerta enviada',
        text:'Carabineros recibio tu alerta de '+tipoMap[tipo],
        background:'#f0f7f3',color:'#004a2b',
        confirmButtonColor:'#006338',confirmButtonText:'Ver estado',
        timer:5000,timerProgressBar:true,
        didOpen:function(){document.body.classList.add('swal-blur')},
        willClose:function(){document.body.classList.remove('swal-blur');window.location.href='seguimiento.html';}
      }).then(function(r){if(r.isConfirmed)window.location.href='seguimiento.html';});
    } else {
      goToStep(currentStep+1);
    }
  });

  renderDots();renderAnswers();
})();
</script>
</body>
</html>
