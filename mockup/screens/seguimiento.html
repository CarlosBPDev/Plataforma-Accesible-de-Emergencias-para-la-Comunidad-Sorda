<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Seguimiento - logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#003d22;--g2:#004a2b;--g3:#006338;--g4:#008548;--g5:#00a85a;
  --gl:#d4ede0;--g50:#f0f7f3;--w:#ffffff;
  --shadow:0 4px 20px rgba(0,40,20,.08);
  --shadow-lg:0 8px 40px rgba(0,40,20,.14);
  --radius:16px;--radius-lg:24px
}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:linear-gradient(170deg,var(--g50) 0%,var(--w) 100%);
  color:var(--g2);
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;min-height:100vh
}
header{
  background:linear-gradient(135deg,var(--g3),var(--g2));
  padding:16px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10
}
header a{color:var(--w);display:flex;transition:opacity .2s}
header a:active{opacity:.6}
header .logo{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--w);opacity:.9}
.content{flex:1;overflow-y:auto;padding:28px 16px 100px;max-width:480px;margin:0 auto;width:100%}
.section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--g2);opacity:.45;margin-bottom:16px;display:flex;align-items:center;gap:8px
}
.section-title svg{width:16px;height:16px}
/* progress */
.progress-wrap{
  background:var(--w);
  border-radius:var(--radius-lg);
  padding:24px 12px 20px;
  box-shadow:var(--shadow);
  border:1px solid rgba(0,99,56,.06);
  margin-bottom:24px
}
.progress-track{
  display:flex;align-items:flex-start;justify-content:space-between;
  position:relative
}
.progress-track .line{
  position:absolute;top:20px;left:40px;right:40px;height:3px;
  background:var(--gl);z-index:0;border-radius:4px;overflow:hidden
}
.progress-track .line .fill{
  height:100%;width:66%;
  background:linear-gradient(90deg,var(--g3),var(--g5));
  border-radius:4px;transition:width .6s
}
.step{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;z-index:1;flex:1
}
.step .dot{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;position:relative
}
.step .dot.done{background:linear-gradient(135deg,var(--g3),var(--g4));color:var(--w);box-shadow:0 0 0 4px var(--g50)}
.step .dot.done svg{color:var(--w)}
.step .dot.active{
  width:50px;height:50px;margin:-3px;
  background:var(--w);
  border:4px solid var(--g3);
  box-shadow:0 0 0 5px rgba(0,99,56,.12);
  color:var(--g3)
}
.step .dot.active svg{color:var(--g3)}
.step .dot.inactive{background:var(--g50);color:var(--g2);border:2px solid var(--gl)}
.step .dot.inactive svg{color:var(--g2);opacity:.4}
.step .dot svg{width:20px;height:20px}
.step .s-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:center;opacity:.4;margin-top:2px}
.step .s-label.on{opacity:1;color:var(--g3)}
body.swal-blur .content,body.swal-blur header,body.swal-blur .bottom-nav{
  filter:blur(4px);transition:filter .3s
}
/* alert list */
.alert-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;margin-bottom:10px;
  background:var(--w);border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid rgba(0,99,56,.06);
  transition:transform .15s;text-decoration:none;color:var(--g2)
}
.alert-item:active{transform:scale(.98)}
.alert-item svg{width:26px;height:26px;flex-shrink:0}
.alert-item .info{flex:1}
.alert-item .info .type{font-size:14px;font-weight:700}
.alert-item .info .date{font-size:11px;opacity:.5;margin-top:2px}
.alert-item .badge{
  font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  padding:4px 10px;border-radius:50px;white-space:nowrap
}
.alert-item .badge.process{background:linear-gradient(135deg,var(--g3),var(--g4));color:var(--w)}
.alert-item .badge.done{background:var(--g50);color:var(--g2)}
/* bottom nav */
.bottom-nav{
  background:var(--w);
  border-top:1px solid rgba(0,99,56,.08);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,6px) 0;
  position:fixed;bottom:0;left:0;right:0;z-index:30
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 4px;text-decoration:none;color:var(--g2);opacity:.4;
  transition:opacity .2s;position:relative
}
.nav-item.active{opacity:1}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:linear-gradient(90deg,var(--g3),var(--g4));
  border-radius:0 0 4px 4px
}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
</style>
</head>
<body>
