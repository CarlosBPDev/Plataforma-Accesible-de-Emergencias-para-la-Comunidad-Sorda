<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Panico - logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#003d22;--g2:#004a2b;--g3:#006338;--g4:#008548;
  --gl:#d4ede0;--g50:#f0f7f3;--w:#ffffff;
  --r1:#b91c1c;--r2:#dc2626;
  --shadow:0 4px 20px rgba(0,40,20,.08);
  --radius:16px;--radius-lg:24px
}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:radial-gradient(ellipse at 50% 30%,var(--g50) 0%,var(--w) 70%);
  color:var(--g2);
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;min-height:100vh
}
header{
  background:linear-gradient(135deg,var(--g3),var(--g2));
  padding:16px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10
}
header a{color:var(--w);display:flex;transition:opacity .2s}
header a:active{opacity:.6}
header .logo{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--w);opacity:.9}
.content{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 24px 100px;text-align:center;
  position:relative;overflow:hidden
}
.content::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 50% 40%,rgba(220,38,38,.04) 0%,transparent 50%);
  pointer-events:none
}
.panic-btn{
  width:210px;height:210px;border-radius:50%;
  border:none;cursor:pointer;
  background:linear-gradient(145deg,var(--r2),var(--r1));
  display:flex;align-items:center;justify-content:center;
  color:var(--w);position:relative;
  box-shadow:0 8px 32px rgba(220,38,38,.45),0 0 0 0 rgba(220,38,38,.3);
  transition:transform .2s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation
}
.panic-btn:active{transform:scale(.93)}
.panic-btn svg{width:90px;height:90px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.15))}
.panic-btn .ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:3px solid rgba(220,38,38,.2);
  transition:all .4s
}
.panic-btn.sending .ring{
  border-color:rgba(255,255,255,.5);
  border-top-color:var(--w);
  animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.panic-btn.sending{animation:pulse 400ms ease-in-out 3}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.hold-text{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3px;
  color:var(--g2);opacity:.4;margin-top:28px
}
.info{
  margin-top:32px;display:flex;flex-direction:column;gap:14px;
  width:100%;max-width:260px
}
.info-row{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 16px;
  background:var(--w);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid rgba(0,99,56,.06)
}
.info-row svg{width:18px;height:18px;opacity:.5;flex-shrink:0}
.info-row span{font-size:13px;font-weight:600;letter-spacing:.3px}
/* bottom nav */
.bottom-nav{
  background:var(--w);
  border-top:1px solid rgba(0,99,56,.08);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,6px) 0;
  position:fixed;bottom:0;left:0;right:0;z-index:30
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 4px;text-decoration:none;color:var(--g2);opacity:.4;
  transition:opacity .2s;position:relative
}
.nav-item.active{opacity:1}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:linear-gradient(90deg,var(--g3),var(--g4));
  border-radius:0 0 4px 4px
}
.  nav-item svg{width:22px;height:22px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
body.swal-blur .content,body.swal-blur header,body.swal-blur .bottom-nav{
  filter:blur(4px);transition:filter .3s
}
</style>
</head>
<body>

<header>
  <a href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M5 12h14"/><path d="M5 12l6-6"/><path d="M5 12l6 6"/></svg></a>
  <div class="logo">logo</div>
  <a href="perfil.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg></a>
</header>

<div class="content">
  <button class="panic-btn" id="panicBtn">
    <div class="ring"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 1 1 4 0 7 7 0 0 1 4 6v3l2 2H4l2-2v-3a7 7 0 0 1 4-6z"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/><path d="M21 6.5A11.2 11.2 0 0 0 18 4"/><path d="M3 6.5A11.2 11.2 0 0 1 6 4"/></svg>
  </button>

  <div class="hold-text">Mantener 3s</div>

  <div class="info">
    <div class="info-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
      <span>GPS Activo</span>
    </div>
    <div class="info-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V7a5 5 0 0 1 10 0"/><path d="M12 14a8 8 0 0 1-8-8"/><path d="M12 18a12 12 0 0 1-12-12"/></svg>
      <span>XX.XXX.XXX-X</span>
    </div>
    <div class="info-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.27 1 .6 2 .95 2.82a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.82.35 1.82.68 2.82.95A2 2 0 0 1 22 16.92z"/></svg>
      <span>+56 9 XXXX XXXX</span>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
    <span>Home</span>
  </a>
  <a href="seguimiento.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
    <span>Seguir</span>
  </a>
  <a href="perfil.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<script>
(function(){
  var btn=document.getElementById('panicBtn');
  var timer=null;
  function start(){
    if(timer)return;
    btn.classList.add('sending');
    timer=setTimeout(function(){
      btn.classList.remove('sending');
      document.body.classList.add('swal-blur');
      Swal.fire({
        icon:'success',
        title:'Alerta Enviada',
        text:'Carabineros ha recibido tu ubicacion',
        background:'#f0f7f3',
        color:'#004a2b',
        confirmButtonColor:'#006338',
        confirmButtonText:'Ver estado',
        timer:5000,
        timerProgressBar:true,
        didOpen:function(){document.body.classList.add('swal-blur')},
        willClose:function(){
          document.body.classList.remove('swal-blur');
          window.location.href='seguimiento.html';
        }
      }).then(function(r){
        if(r.isConfirmed)window.location.href='seguimiento.html';
      });
      timer=null;
    },1200);
  }
  function cancel(){
    if(timer){clearTimeout(timer);timer=null}
    btn.classList.remove('sending');
  }
  btn.addEventListener('mousedown',start);
  btn.addEventListener('mouseup',cancel);
  btn.addEventListener('mouseleave',cancel);
  btn.addEventListener('touchstart',start,{passive:true});
  btn.addEventListener('touchend',cancel,{passive:true});
  btn.addEventListener('touchcancel',cancel,{passive:true});
})();
</script>
</body>
</html>
