<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Videollamada - logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#003d22;--g2:#004a2b;--g3:#006338;--g4:#008548;
  --w:#ffffff;
  --r1:#b91c1c;--r2:#dc2626;
  --radius:16px;--radius-lg:24px
}
html,body{height:100%}
body{
  font-family:'DM Sans',-apple-system,sans-serif;
  background:#121212;
  color:var(--w);
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;min-height:100vh
}
header{
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  padding:16px 20px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:absolute;top:0;left:0;right:0;z-index:10
}
header a{color:var(--w);display:flex;opacity:.8;transition:opacity .2s}
header a:active{opacity:.5}
header .logo{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--w);opacity:.7}
.content{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:100px 24px 120px;text-align:center;position:relative
}
.video-area{
  width:100%;max-width:400px;
  aspect-ratio:16/9;
  background:linear-gradient(145deg,#1e1e1e,#2a2a2a);
  border-radius:var(--radius-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 0 40px rgba(0,0,0,.4)
}
.video-area::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 40%,rgba(0,99,56,.06),transparent 60%);
  pointer-events:none
}
.video-area .big-icon svg{width:56px;height:56px;opacity:.15;margin-bottom:12px}
.video-area .v-label{font-size:13px;font-weight:500;opacity:.3;letter-spacing:1px;text-transform:uppercase}
.pip{
  position:absolute;bottom:12px;right:12px;
  width:88px;height:66px;
  background:linear-gradient(145deg,#222,#333);
  border-radius:10px;
  border:2px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden
}
.pip svg{width:28px;height:28px;opacity:.2}
.connecting{
  display:flex;align-items:center;gap:12px;
  margin-top:24px;padding:10px 20px;
  background:rgba(255,255,255,.05);
  border-radius:50px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.06)
}
.connecting .pulse-dot{
  width:10px;height:10px;border-radius:50%;
  background:#22c55e;
  animation:pulse-dot 1.4s ease-in-out infinite
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.connecting svg{width:20px;height:20px;opacity:.5}
.connecting .c-label{font-size:12px;font-weight:600;letter-spacing:.5px;opacity:.7}
.actions{
  display:flex;gap:20px;margin-top:28px
}
.action-btn{
  width:56px;height:56px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .15s,opacity .15s;
  -webkit-tap-highlight-color:transparent
}
.action-btn:active{transform:scale(.88)}
.action-btn svg{width:24px;height:24px}
.action-btn.mic{background:rgba(255,255,255,.1);color:var(--w)}
.action-btn.mic.muted{background:var(--r2);color:var(--w)}
.action-btn.end{background:var(--r2);color:var(--w);box-shadow:0 4px 16px rgba(220,38,38,.3)}
.stamp{
  position:absolute;bottom:100px;right:16px;
  transform:rotate(-12deg);
  padding:6px 16px;
  border:2px solid rgba(255,255,255,.08);
  border-radius:6px;
  font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:2px;
  color:rgba(255,255,255,.08)
}
.bottom-nav{
  background:rgba(18,18,18,.95);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;padding:6px 0 env(safe-area-inset-bottom,6px) 0;
  position:fixed;bottom:0;left:0;right:0;z-index:30
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 4px;text-decoration:none;color:var(--w);opacity:.4;
  transition:opacity .2s;position:relative
}
.nav-item.active{opacity:1}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:24px;height:3px;background:linear-gradient(90deg,var(--g3),var(--g4));
  border-radius:0 0 4px 4px
}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <a href="../index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M5 12h14"/><path d="M5 12l6-6"/><path d="M5 12l6 6"/></svg></a>
  <div class="logo">logo</div>
  <div style="width:24px"></div>
</header>

<div class="content">
  <div class="video-area">
    <div class="big-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8l-6 4 6 4V8z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg></div>
    <div class="v-label">Conectando</div>
    <div class="pip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg></div>
  </div>

  <div class="connecting">
    <div class="pulse-dot"></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="4"/><path d="M10 15H4a4 4 0 0 0-4 4v1"/><circle cx="17" cy="17" r="3"/><path d="M21 21l-1.9-1.9"/></svg>
    <span class="c-label">Buscando interprete LSCh</span>
  </div>

  <div class="actions">
    <button class="action-btn mic" id="micBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21h8"/><path d="M12 17v4"/></svg></button>
    <button class="action-btn end" id="endBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/><path d="M16 11.4A4 4 0 0 0 14.5 6"/><path d="M1 1l22 22"/></svg></button>
  </div>

  <div class="stamp">Proximamente</div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2"/><path d="M9 21V9h6v12"/></svg>
    <span>Home</span>
  </a>
  <a href="seguimiento.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12l2 2 4-4"/><path d="M20 12a8 8 0 1 1-3.7-6.77"/><path d="M21 3v5h-5"/></svg>
    <span>Seguir</span>
  </a>
  <a href="perfil.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M6.17 18a6 6 0 0 1 11.66 0"/></svg>
    <span>Perfil</span>
  </a>
</nav>

<script>
(function(){
  var micBtn=document.getElementById('micBtn');
  var endBtn=document.getElementById('endBtn');
  micBtn.addEventListener('click',function(){this.classList.toggle('muted')});
  endBtn.addEventListener('click',function(){window.location.href='../index.html'});
})();
</script>
</body>
</html>
